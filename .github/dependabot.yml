version: 2
updates:
  # Next.js / web (リポジトリルートの pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # minor / patch をまとめて PR ノイズを削減。
      # major は grouped から外れ個別 PR となり、破壊的変更を精査できる。
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Flutter / Dart (flutter/pubspec.yaml)
  - package-ecosystem: "pub"
    directory: "/flutter"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      pub-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions ワークフローの action バージョン
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # setup-cli@v2 は version input の pin が効かず latest CLI が入り
      # e2e の supabase start が壊れる (2026-06-12 実測、e2e.yml 参照)。
      # v1 に留めるため major bump の提案を止める。
      - dependency-name: "supabase/setup-cli"
        update-types: ["version-update:semver-major"]
    groups:
      github-actions:
        patterns:
          - "*"

name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # version は package.json の `packageManager` フィールドから自動取得する
        # (二重指定すると ERR_PNPM_BAD_PM_VERSION で失敗する)。

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          # ローカルで実証済みの版に pin する。latest だと CLI 世代差で
          # config.toml のキー解釈や -x のサービス名が変わり起動に失敗する
          # (実例: 別世代 CLI は auth.oauth_server / db.health_timeout 等を
          # invalid keys として拒否し、-x の analytics も認識しない)。
          # ⚠ setup-cli@v2 は version input の pin が効かず latest CLI が
          # 入る (2026-06-12 実測: pin 2.101.0 のまま v2 化したら新世代 CLI が
          # 動き 54322 二重 bind で start 失敗、CI run 27419022052)。
          # v1 に留めること (dependabot.yml で major bump を ignore 済み)。
          version: 2.101.0

      - name: Start Supabase local stack
        # E2E に不要なサービスは除外して起動を軽くする
        # (-x の有効値は `supabase start --help` 参照。analytics = Logflare)
        run: supabase start -x studio,imgproxy,edge-runtime,vector,analytics

      - name: Generate .env.e2e
        run: ./scripts/e2e-env.sh

      - name: Build Next.js with E2E env
        run: ./scripts/e2e-build.sh

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          # lockfile 変更時もフルダウンロードを避け、旧 cache から復元する
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          # offline.spec.ts の opt-in ゲートを CI では常時有効にする
          # (SW は production build 前提のため、ローカル dev 検証者が誤って踏まない構え)
          E2E_OFFLINE: "1"
        run: pnpm exec playwright test

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

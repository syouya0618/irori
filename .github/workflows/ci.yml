name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # version は package.json の `packageManager` フィールドから自動取得する
        # (二重指定すると ERR_PNPM_BAD_PM_VERSION で失敗する)。

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      - name: Detect Supabase silent fail (.single()/.maybeSingle()/multi-row without error)
        # strict: issue #20/#14 で全違反を解消済み。新規 silent fail は CI で fail させる。
        # issue #14 推奨3: multi-row クエリ (.select()/.rpc() で error 欠落) も検出する。
        run: ./scripts/check-supabase-error-destructure.py --strict

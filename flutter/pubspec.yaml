name: irori
description: A family productivity app for baby logs, meals, shopping, and stock. (Flutter migration of the Next.js original)
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ^3.44.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Supabase: Auth / DB / Realtime / Storage
  supabase_flutter: ^2.12.4

  # State 管理 / Routing
  # riverpod 3.x は API 変更あり (StreamNotifier → AsyncNotifier 推奨等)
  # 設計書 Section 4 のサンプルは Phase 1 着手時に 3.x API で再執筆する。
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0

  # PDF (baby-report はクライアントサイド生成 — Section 4 / 7.2.3 参照)
  pdf: ^3.12.0
  printing: ^5.14.3

  # Charts (baby 7 日サマリー Bar Chart, trend Line Chart)
  fl_chart: ^1.2.0

  # Models (freezed 3.x + JSON 自動復元)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Icons (既存 Lucide React の移植)
  lucide_icons_flutter: ^3.1.14

  # 授乳タイマーの中断復元 (原典 feeding-timer.tsx の localStorage 相当)。
  # 既に transitive 解決済み (supabase_flutter 経由) の版を direct に昇格。
  shared_preferences: ^2.5.5

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  # custom_lint / riverpod_lint は Phase 0 では analysis_options.yaml から
  # 一切 include しておらぬので削除。両者は analyzer の peer 制約が
  # json_serializable と衝突する (custom_lint 0.8.1 が analyzer ^8.0.0、
  # json_serializable 6.14.0 が analyzer >=10.0.0)。
  # Phase 1 で riverpod の実コード (StreamNotifier 等) を書く時に
  # peer 互換版を確認の上で再追加すること。

flutter:
  uses-material-design: true
  # 既存 Liquid Glass design system のフォントは Noto Sans JP を想定。
  # Phase 1 着手時に fonts assets を追加する (PDF 用 Noto Sans JP 埋め込みと共通化)。
